name: ch

services:
  db-pg:
    image: ch-web-api:v1
    ports:
      - 5432:5432
    volumes:
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./init/postgresql.conf:/etc/postgresql/postgresql.conf
      # - ./pg-data:/var/lib/postgresql
      # - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # - /proc:/host/proc:ro
      # - /sys:/host/sys:ro
      # - /:/host/rootfs:ro
    networks:
      backend:
        ipv4_address: 172.18.0.2
    healthcheck:
      test: ['CMD-SHELL', "sh -c 'pg_isready -U postgres -d chinook'"]
      interval: 3s
      timeout: 3s
      retries: 30

  api-web:
    build: ./apps/api
    ports:
      - 8000:8000
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
    networks:
      backend:
        ipv4_address: 172.18.0.3
    depends_on:
      db-pg:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "sh -c 'curl -k https://localhost:8000/healthy'"]
      interval: 3s
      timeout: 3s
      retries: 30

