name: ch

services:
  db-pg:
    extends:
      file: ./apps/db/docker-compose.yml
      service: db-pg
    ports:
      - 5432:5432
    networks:
      backend:
        ipv4_address: 172.18.0.2

  api-web:
    build: ./apps/api
    extends:
      file: ./apps/api/docker-compose.yml
      service: api-web
    networks:
      backend:
        ipv4_address: 172.18.0.3
    depends_on:
      db-pg:
        condition: service_healthy

  obsvr-prom:
    extends:
      file: ./apps/obsvr/docker-compose.yml
      service: obsvr-prom
    ports:
      - 9090:9090
    networks:
      backend:
        ipv4_address: 172.18.0.4
  obsvr-graf:
    extends:
      file: ./apps/obsvr/docker-compose.yml
      service: obsvr-graf
    ports:
      - 3000:3000
    networks:
      backend:
        ipv4_address: 172.18.0.5

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
