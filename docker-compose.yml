name: ch

services:
  db-pg:
    extends:
      file: ./apps/db/docker-compose.yml
      service: db-pg
    networks:
      backend:
        ipv4_address: 172.18.0.2

  api-web:
    build: ./apps/api
    extends:
      file: ./apps/api/docker-compose.yml
      service: api-web
    networks:
      backend:
        ipv4_address: 172.18.0.3
    depends_on:
      db-pg:
        condition: service_healthy

  obsvr-prom:
    extends:
      file: ./apps/obsvr/docker-compose.yml
      service: obsvr-prom
    networks:
      backend:
        ipv4_address: 172.18.0.4

  obsvr-graf:
    extends:
      file: ./apps/obsvr/docker-compose.yml
      service: obsvr-graf
    networks:
      backend:
        ipv4_address: 172.18.0.5

  obsvr-loki:
    extends:
      file: ./apps/obsvr/docker-compose.yml
      service: obsvr-loki
    networks:
      backend:
        ipv4_address: 172.18.0.6

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
