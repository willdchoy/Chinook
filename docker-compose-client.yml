name: ch

networks:
  ch-client-network:
    name: ch-client-network
  ch-obsvr-network:
    name: ch-obsvr-network

services:
  client-db:
    build: ./apps/db
    hostname: ch-client-db
    container_name: ch-client-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chinook
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql.log
    ports:
      - "5432:5432"
    volumes:
      - ./_data/pg-data:/var/lib/postgresql
      - ./_logs/pg-logs:/var/log/postgresql
    networks:
      - ch-client-network
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U postgres -d chinook'"]
      interval: 3s
      timeout: 3s
      retries: 30

  client-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    hostname: ch-client-db-exporter
    networks: [ch-client-network, ch-obsvr-network]
    command:
      - "--no-collector.stat_bgwriter"
    environment:
      PG_COLLECTOR_DATABASE_ENABLED: false
      PG_COLLECTOR_REPLICATION_ENABLED: false
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@ch-client-db:5432/chinook?sslmode=disable"
    ports:
      - "9187:9187"
    volumes:
      - ./obsvr/postgres_exporter/postgres_exporter.yml:/postgres_exporter.yml
    depends_on:
      client-db:
        condition: service_healthy

  client-api:
    build: ./apps/api
    hostname: app
    container_name: ch-client-api
    working_dir: /var/www/app
    restart: unless-stopped
    command: ./main
    environment:
      API_LOG_DIR: /var/log/app
      GO_ENV: development
    ports:
      - 8000:8000
      - 9092:9092
    volumes:
      - ./apps/api/bin:/var/www/app
    networks:
      - ch-client-network
    depends_on:
      client-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'curl -k https://localhost:8000/api/v1/health'"]
      interval: 30s
      timeout: 3s
      retries: 30
    develop:
      watch:
        - path: ./apps/api/bin
          target: /var/www/app/bin
          action: sync+restart
