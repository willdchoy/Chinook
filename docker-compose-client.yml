networks:
  ch-client-network:
    name: ch-client-network

services:
  ch-client-db:
    image: postgres:18
    container_name: ch-client-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chinook
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=postgresql.log
    ports:
      - "5432:5432"
    volumes:
      - ./_data/pg-data:/var/lib/postgresql
      - ./_logs/pg-logs:/var/log/postgresql
    networks:
      - ch-client-network
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U postgres -d chinook'"]
      interval: 3s
      timeout: 3s
      retries: 30

  ch-client-api:
    build: ./apps/api
    container_name: ch-client-api
    working_dir: /var/www/ch-client-api
    restart: unless-stopped
    command: make air-docker
    environment:
      API_LOG_DIR: /var/log/ch-client-api
      GO_ENV: development
    ports:
      - 8000:8000
    volumes:
      - ./apps/api:/var/www/ch-client-api
      - ./_logs/api-logs:/var/log/ch-client-api
    networks:
      - ch-client-network
    depends_on:
      ch-client-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'curl -k https://localhost:8000/api/v1/health'"]
      interval: 30s
      timeout: 3s
      retries: 30
