name: ch
services:
  db-pg:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    volumes:
      - ./pg-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', "sh -c 'pg_isready -U admin -d chinook'"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  pg-data:
