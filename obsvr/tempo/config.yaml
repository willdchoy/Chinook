# obsvr/tempo/config.yaml
# Single-binary Tempo — suitable for local dev / staging.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

# Accept traces via OTLP gRPC (from Alloy)
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Trace storage — local filesystem
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

ingester:
  max_block_duration: 5m # flush traces to backend every 5 min

compactor:
  compaction:
    block_retention: 48h # keep traces for 48 hours locally

# TraceQL search index
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

# Metrics generated from traces (span-metrics → Prometheus)
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: ch-client
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      # Write span-derived metrics back to Alloy's remote_write receiver
      # so they appear in Grafana alongside app metrics.
      - url: http://alloy:12345/api/prom/push
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
      generate_native_histograms: both
