apiVersion: 1

datasources:
  # ── Loki ────────────────────────────────────────────────────
  - name: ch-loki-1
    uid: ch-loki-1
    type: loki
    access: proxy
    url: http://ch-loki-1:3100
    isDefault: false
    jsonData:
      maxLines: 5000
      derivedFields:
        - name: trace_id
          matcherRegex: '"request_id"\s*:\s*"([a-f0-9\-]{32,})"'
          url: "${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: View Trace

  # ── Tempo ────────────────────────────────────────────────────
  - name: ch-tempo-1
    uid: ch-tempo-1
    type: tempo
    access: proxy
    url: http://ch-tempo-1:3200
    isDefault: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "1h"
        spanEndTimeShift: "-1h"
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  # ── Prometheus (Alloy metrics endpoint) ─────────────────────
  - name: ch-prometheus-1
    uid: ch-prometheus-1
    type: prometheus
    access: proxy
    url: http://ch-prometheus-1:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
